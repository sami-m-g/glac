steps:
  - id: "Build image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
      - "."
  - id: "Push image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
  - id: "Deploy to Cloud Run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "glac"
      - "--image=gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
      - "--region=${_GOOGLE_CLOUD_LOCATION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--quiet"
      - "--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=1"
      - "--set-env-vars=GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
images:
  - "gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _GOOGLE_CLOUD_LOCATION: "us-central1"
