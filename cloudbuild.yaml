steps:
  - id: "Build image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
      - "."
  - id: "Push image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
  - id: "Deploy to Cloud Run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "glac"
      - "--image=gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--quiet"
images:
  - "gcr.io/$PROJECT_ID/glac:$SHORT_SHA"
options:
  logging: CLOUD_LOGGING_ONLY
