steps:
  # ===============================
  # Build & Push Server
  # ===============================
  - id: "Build & Push server"
    name: "gcr.io/cloud-builders/docker"
    env:
      - DOCKER_BUILDKIT=1
    entrypoint: /bin/sh
    args:
      - "-c"
      - |
        docker pull gcr.io/$PROJECT_ID/glac-server:latest || true

        docker build \
          --cache-from=gcr.io/$PROJECT_ID/glac-server:latest \
          -f Dockerfile.server \
          -t gcr.io/$PROJECT_ID/glac-server:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/glac-server:latest \
          .

        docker push --all-tags gcr.io/$PROJECT_ID/glac-server

  # ===============================
  # Build & Push Client
  # ===============================
  - id: "Build & Push client"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]
    env:
      - DOCKER_BUILDKIT=1
    entrypoint: /bin/sh
    args:
      - "-c"
      - |
        docker pull gcr.io/$PROJECT_ID/glac-client:latest || true

        docker build \
          --cache-from=gcr.io/$PROJECT_ID/glac-client:latest \
          -f Dockerfile.client \
          -t gcr.io/$PROJECT_ID/glac-client:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/glac-client:latest \
          .

        docker push --all-tags gcr.io/$PROJECT_ID/glac-client

  # ===============================
  # Deploy Server
  # ===============================
  - id: "Deploy server"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - glac-server
      - --image=gcr.io/$PROJECT_ID/glac-server:$SHORT_SHA
      - --region=${_GOOGLE_CLOUD_LOCATION}
      - --platform=managed
      - --allow-unauthenticated
      - --quiet
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=1
      - --set-env-vars=GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID

  # ===============================
  # Fetch Server URL
  # ===============================
  - id: "Fetch server url"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: /bin/sh
    args:
      - "-c"
      - |
        gcloud run services describe glac-server \
          --region=${_GOOGLE_CLOUD_LOCATION} \
          --format='value(status.url)' > /workspace/server_url.txt

  # ===============================
  # Deploy Client
  # ===============================
  - id: "Deploy client"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: /bin/sh
    args:
      - "-c"
      - |
        AGENT_BASE_URL=$(cat /workspace/server_url.txt)

        gcloud run deploy glac-client \
          --image=gcr.io/$PROJECT_ID/glac-client:$SHORT_SHA \
          --region=${_GOOGLE_CLOUD_LOCATION} \
          --platform=managed \
          --allow-unauthenticated \
          --quiet \
          --set-env-vars=AGENT_BASE_URL=$$AGENT_BASE_URL

images:
  - gcr.io/$PROJECT_ID/glac-client:$SHORT_SHA
  - gcr.io/$PROJECT_ID/glac-server:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _GOOGLE_CLOUD_LOCATION: "us-central1"
