steps:
  # ===============================
  # Build Client (Next.js)
  # ===============================
  - id: "Build client image"
    name: "gcr.io/cloud-builders/docker"
    env:
      - DOCKER_BUILDKIT=1
    args:
      - "build"
      - "-f"
      - "Dockerfile.client"
      - "-t"
      - "gcr.io/$PROJECT_ID/glac-client:$SHORT_SHA"
      - "."

  # ===============================
  # Build Server (Python Agent)
  # ===============================
  - id: "Build server image"
    name: "gcr.io/cloud-builders/docker"
    env:
      - DOCKER_BUILDKIT=1
    args:
      - "build"
      - "-f"
      - "Dockerfile.server"
      - "-t"
      - "gcr.io/$PROJECT_ID/glac-server:$SHORT_SHA"
      - "."

  # ===============================
  # Deploy Server First
  # ===============================
  - id: "Deploy server to Cloud Run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "glac-server"
      - "--image=gcr.io/$PROJECT_ID/glac-server:$SHORT_SHA"
      - "--region=${_GOOGLE_CLOUD_LOCATION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--quiet"

  # ===============================
  # Deploy Client
  # ===============================
  - id: "Deploy client to Cloud Run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "glac-client"
      - "--image=gcr.io/$PROJECT_ID/glac-client:$SHORT_SHA"
      - "--region=${_GOOGLE_CLOUD_LOCATION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--quiet"
      - "--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=1"
      - "--set-env-vars=GOOGLE_CLOUD_LOCATION=${_GOOGLE_CLOUD_LOCATION}"
      - "--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID"

images:
  - "gcr.io/$PROJECT_ID/glac-client:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/glac-server:$SHORT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _GOOGLE_CLOUD_LOCATION: "us-central1"
